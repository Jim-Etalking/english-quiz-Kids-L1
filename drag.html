<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drag the Toys</title>
<style>
* { box-sizing: border-box; }
body {
    margin: 0;
    padding: 0;
    background: #c8dff0;
    font-family: Arial, sans-serif;
    text-align: center;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
h1 {
    margin: 6px 0 2px;
    color: #333;
    font-size: clamp(16px, 2.5vw, 30px);
    font-weight: bold;
    flex-shrink: 0;
}
.scene {
    position: relative;
    /* 寬跟高都限制，讓瀏覽器自動選小的那個 */
    width: min(100vw, 80dvh * 1456 / 816);
    aspect-ratio: 1456 / 816;
}
.bg {
    width: 100%;
    display: block;
}

/* ── 拖曳物件 ── */
.item {
    position: absolute;
    touch-action: none;
    cursor: grab;
    user-select: none;
    transition: none;
    display: none;
}
.item.active { display: block; }

#bear { left: 38%; top: 68%; }
#car  { left: 38%; top: 68%; }
#ball { left: 38%; top: 68%; }

/* ── 圈選熱區 ── */
.hotspot {
    position: absolute;
    cursor: pointer;
    border-radius: 50%;
    display: none;
    box-sizing: border-box;
    border: 3px dashed transparent;
}
.hotspot.active { display: block; }
.hotspot.correct {
    border: 5px solid #2a7d2e;
    background: rgba(42,125,46,0.18);
    animation: pulse 0.4s ease;
    cursor: default;
}
.hotspot.wrong {
    border: 5px solid #e74c3c;
    background: rgba(231,76,60,0.18);
    animation: shake 0.4s ease;
}
@keyframes pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.08); }
    100% { transform: scale(1); }
}
@keyframes shake {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-6px); }
    75%     { transform: translateX(6px); }
}

/* ── 訊息 ── */
#message {
    font-size: clamp(18px, 3vw, 28px);
    font-weight: bold;
    margin: 6px;
    min-height: 36px;
    color: #2a7d2e;
}

/* ── 進度點 ── */
#progress {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 6px 0;
    flex-wrap: wrap;
}
.dot {
    width: 13px; height: 13px;
    border-radius: 50%;
    background: #ccc;
    transition: background 0.3s;
}
.dot.done   { background: #2a7d2e; }
.dot.active { background: #f5a623; }

/* ── 開始畫面 ── */
#start-screen {
    position: fixed;
    inset: 0;
    background: #f3f6fb;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
}
#start-btn {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: bold;
    padding: 24px 64px;
    border-radius: 50px;
    border: none;
    background: #f5a623;
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 0 #c47d0e;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 4px;
}
#start-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #c47d0e;
}

/* =========================================
   全新：完成畫面 (可愛立體獎狀風) 
   ========================================= */
#finish {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    flex-direction: column;
    align-items: center;
    gap: 20px;
    background: #ffffff;
    padding: 50px 40px 40px;
    border-radius: 40px;
    border: 8px solid #ffd166;
    box-shadow: 0 25px 50px rgba(255, 166, 0, 0.2), inset 0 0 0 8px #fff9e6;
    z-index: 999;
    animation: popBounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    width: 90vw;
    max-width: 450px;
}

.ribbon {
    position: absolute;
    top: -25px;
    background: #ef476f;
    color: white;
    padding: 10px 30px;
    border-radius: 30px;
    font-size: clamp(18px, 4vw, 24px);
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(239, 71, 111, 0.4);
}

.stars {
    font-size: clamp(40px, 8vw, 60px);
    letter-spacing: 5px;
    filter: drop-shadow(0 4px 6px rgba(255, 209, 102, 0.6));
}

.finish-text {
    font-size: clamp(22px, 4vw, 32px);
    color: #06d6a0;
    font-weight: 900;
    margin-bottom: 10px;
}

/* 立體閃亮按鈕 */
#data-btn {
    display: none;
    background: linear-gradient(180deg, #118ab2 0%, #0c637f 100%);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 16px 36px;
    font-size: clamp(16px, 3vw, 20px);
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 8px 0 #073b4c, 0 15px 20px rgba(17, 138, 178, 0.4);
    transition: all 0.1s ease;
    display: flex;
    align-items: center;
    gap: 10px;
}

#data-btn:active {
    transform: translateY(8px);
    box-shadow: 0 0 0 #073b4c, 0 5px 10px rgba(17, 138, 178, 0.4);
}

@keyframes popBounce {
    0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    80%  { transform: translate(-50%, -50%) scale(1.05); }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

/* =========================================
   全新：數據面板 (家長專業報表風)
   ========================================= */
#data-panel {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(5px);
    z-index: 2000;
    align-items: center;
    justify-content: center;
}
#data-panel.show { display: flex; animation: fadeIn 0.3s ease; }

#data-inner {
    background: #ffffff;
    border-radius: 24px;
    padding: 35px 40px;
    max-width: 600px;
    width: 90vw;
    max-height: 85dvh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 25px 50px rgba(0,0,0,0.15);
}

.report-header {
    text-align: center;
    margin-bottom: 25px;
}

.report-header h2 {
    margin: 0 0 8px;
    font-size: clamp(20px, 4vw, 26px);
    color: #1e293b;
}

.report-header p {
    margin: 0;
    color: #64748b;
    font-size: 15px;
}

.table-container {
    overflow-y: auto;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
}

#data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

#data-table th {
    background: #f8fafc;
    padding: 14px 16px;
    text-align: left;
    color: #475569;
    font-weight: 700;
    border-bottom: 2px solid #e2e8f0;
    position: sticky;
    top: 0;
}

#data-table td {
    padding: 14px 16px;
    border-bottom: 1px solid #f1f5f9;
    color: #334155;
    vertical-align: middle;
}

/* 狀態標籤 (Pills) */
.badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    display: inline-block;
    white-space: nowrap;
}
.badge.perfect { background: #dcfce7; color: #166534; }
.badge.learning { background: #fef9c3; color: #854d0e; }

.speed { font-weight: 600; color: #0ea5e9; white-space: nowrap; }

#close-btn {
    margin-top: 25px;
    padding: 14px;
    border-radius: 12px;
    border: 2px solid #e2e8f0;
    background: transparent;
    color: #475569;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
}
#close-btn:hover {
    background: #f1f5f9;
    color: #0f172a;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

body.finished .scene,
body.finished #question,
body.finished #progress,
body.finished #message {
    opacity:.25;
    transition: opacity .5s ease;
}
</style>
</head>
<body>

<div id="start-screen">
    <button id="start-btn">START</button>
</div>

<div id="progress"></div>
<h1 id="question"></h1>

<div class="scene" id="scene">
    <img class="bg" src="room_background.png">

    <img id="bear" class="item" src="bear_v3.png">
    <img id="car"  class="item" src="car.png">
    <img id="ball" class="item" src="ball.png">

    <div class="hotspot" id="hs-sun"></div>
    <div class="hotspot" id="hs-door"></div>
    <div class="hotspot" id="hs-books"></div>
    <div class="hotspot" id="hs-window"></div>
    <div class="hotspot" id="hs-cloud"></div>
</div>

<div id="message"></div>
<div id="finish">
    <div class="ribbon"> You Did It! </div>
    <div class="stars">⭐⭐⭐⭐⭐</div>
    <div class="finish-text">You found all the toys!</div>
    <button id="data-btn">
        <span class="btn-icon">💌</span> ✨ View Results
    </button>
</div>

<div id="data-panel">
  <div id="data-inner">
    <div class="report-header">
        <h2>📝 幼兒英語聽力與認知分析</h2>
        <p>透過直覺互動，我們觀察到孩子的學習亮點</p>
    </div>
    <div class="table-container">
        <table id="data-table">
          <thead>
            <tr>
              <th>單字 / 聽力指令</th>
              <th>反應速度</th>
              <th>理解力指標</th>
            </tr>
          </thead>
          <tbody id="data-tbody"></tbody>
        </table>
    </div>
    <button id="close-btn">完成並關閉</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// 題目資料
// type: "drag" 或 "tap"
//
// drag: zone（判定區，%）, snap（吸附位置，%）
// tap:  targets（正確熱區 id 陣列）, decoys（干擾熱區 id 陣列，之後可加）
//
// hotspots: 各熱區的位置（%: left, top, width, height）
// ═══════════════════════════════════════════════
const HOTSPOT_DEFS = {
    "hs-sun":    { left: 2,  top: 5,  width: 18, height: 35 },
    "hs-door":   { left: 12, top: 10, width: 28, height: 75 },
    "hs-books":  { left: 68, top: 50, width: 22, height: 48 },
    "hs-window": { left: 82, top: 8,  width: 17, height: 45 },
    "hs-cloud":  { left: 38, top: 0,  width: 22, height: 18 },
};

const questions = [
    // ── 拖曳題 ──
    {
        type: "drag",
        itemId: "bear",
        question: "Can you put the bear on the rug?",
        audio: "q1.mp3",
        zone: { left: 0, right: 44, top: 60, bottom: 100 },
        snap: { left: 8, top: 68 },
    },
    {
        type: "drag",
        itemId: "car",
        question: "Can you put the car on the table?",
        audio: "q2.mp3",
        zone: { left: 44, right: 70, top: 45, bottom: 65 },
        snap: { left: 53, top: 54 },
    },
    {
        type: "drag",
        itemId: "ball",
        question: "Can you put the ball in front of the table?",
        audio: "q3.mp3",
        zone: { left: 48, right: 74, top: 66, bottom: 90 },
        snap: { left: 52, top: 70 },
    },
    // ── 圈選題 ──
    {
        type: "tap",
        question: "Can you find the sun? ☀️",
        audio: "q4.mp3",
        targets: ["hs-sun"],
        decoys:  ["hs-door", "hs-books", "hs-window", "hs-cloud"],
    },
    {
        type: "tap",
        question: "Where is the door? 🚪",
        audio: "q5.mp3",
        targets: ["hs-door"],
        decoys:  ["hs-sun", "hs-books", "hs-window", "hs-cloud"],
    },
    {
        type: "tap",
        question: "Can you find the books? 📚",
        audio: "q6.mp3",
        targets: ["hs-books"],
        decoys:  ["hs-sun", "hs-door", "hs-window", "hs-cloud"],
    },
    {
        type: "tap",
        question: "Where is the window? 🪟",
        audio: "q7.mp3",
        targets: ["hs-window"],
        decoys:  ["hs-sun", "hs-door", "hs-books", "hs-cloud"],
    },
    {
        type: "tap",
        question: "Can you find the cloud? ☁️",
        audio: "q8.mp3",
        targets: ["hs-cloud"],
        decoys:  ["hs-sun", "hs-door", "hs-books", "hs-window"],
    },
];

// ── 音效設定 ──
const CORRECT_SOUNDS = ["correct1.mp3", "correct2.mp3", "correct3.mp3"];
const WRONG_SOUNDS   = ["wrong1.mp3"];

function playSound(file) {
    const audio = new Audio(file);
    audio.play().catch(() => {}); // 忽略瀏覽器自動播放限制錯誤
}

function playCorrect() {
    const file = CORRECT_SOUNDS[Math.floor(Math.random() * CORRECT_SOUNDS.length)];
    playSound(file);
}

function playWrong() {
    const file = WRONG_SOUNDS[Math.floor(Math.random() * WRONG_SOUNDS.length)];
    playSound(file);
}

function playQuestion(n) {
    if (n < questions.length && questions[n].audio) {
        playSound(questions[n].audio);
    }
}

// ═══════════════════════════════════════════════
// 狀態
// ═══════════════════════════════════════════════
let currentQ   = 0;
let dragging   = false;
let activeItem = null;
let offsetX = 0, offsetY = 0;
let tapLocked  = false;

// 答題數據記錄
let qStartTime  = 0;
let qAttempts   = 0;
const qResults  = []; // { question, seconds, attempts }

const scene      = document.getElementById("scene");
const msgEl      = document.getElementById("message");
const finishEl   = document.getElementById("finish");
const questionEl = document.getElementById("question");
const progressEl = document.getElementById("progress");

// ═══════════════════════════════════════════════
// 初始化進度點
// ═══════════════════════════════════════════════
function buildDots() {
    progressEl.innerHTML = "";
    questions.forEach((_, i) => {
        const d = document.createElement("div");
        d.className = "dot";
        d.id = "dot" + i;
        progressEl.appendChild(d);
    });
}

function updateDots(current) {
    questions.forEach((_, i) => {
        const dot = document.getElementById("dot" + i);
        dot.className = "dot";
        if (i < current)   dot.classList.add("done");
        if (i === current) dot.classList.add("active");
    });
}

// ═══════════════════════════════════════════════
// 套用熱區位置（百分比 → style）
// ═══════════════════════════════════════════════
function applyHotspotPositions() {
    Object.entries(HOTSPOT_DEFS).forEach(([id, pos]) => {
        const el = document.getElementById(id);
        el.style.left   = pos.left   + "%";
        el.style.top    = pos.top    + "%";
        el.style.width  = pos.width  + "%";
        el.style.height = pos.height + "%";
    });
}


// ═══════════════════════════════════════════════
// 載入第 n 題（已放好的物件留在畫面上）
// ═══════════════════════════════════════════════
function loadQuestion(n) {
    // 只清除熱區，已完成的拖曳物件保留
    document.querySelectorAll(".hotspot").forEach(el => {
        el.classList.remove("active", "correct", "wrong");
    });
    msgEl.textContent = "";
    tapLocked = false;

    if (n >= questions.length) {
        document.body.classList.add("finished");
        questionEl.style.display = "";
        finishEl.style.display   = "flex";
        dataBtn.style.display    = "flex";
        updateDots(questions.length);
        return;
    }

    const q = questions[n];
    questionEl.style.display = "";
    questionEl.textContent   = q.question;
    updateDots(n);
    // 稍微延遲再播，避免切換動畫干擾
    setTimeout(() => playQuestion(n), 300);

    // 開始計時 & 重設嘗試次數
    qStartTime = Date.now();
    qAttempts  = 0;

    if (q.type === "drag") {
        const el = document.getElementById(q.itemId);
        el.classList.add("active");
        if (el.style.cursor !== "default") {
            el.style.left = "";
            el.style.top  = "";
        }
    } else {
        [...q.targets, ...q.decoys].forEach(id => {
            document.getElementById(id).classList.add("active");
        });
    }
}

// ═══════════════════════════════════════════════
// 拖曳邏輯
// ═══════════════════════════════════════════════
document.querySelectorAll(".item").forEach(item => {
    item.addEventListener("pointerdown", (e) => {
        const q = questions[currentQ];
        if (q.type !== "drag") return;
        if (item.id !== q.itemId) return;
        if (item.style.cursor === "default") return;

        dragging   = true;
        activeItem = item;
        offsetX    = e.offsetX;
        offsetY    = e.offsetY;
        item.setPointerCapture(e.pointerId);
    });
});

window.addEventListener("pointermove", (e) => {
    if (!dragging || !activeItem) return;
    const rect = scene.getBoundingClientRect();
    activeItem.style.left = (e.clientX - rect.left - offsetX) + "px";
    activeItem.style.top  = (e.clientY - rect.top  - offsetY) + "px";
});

window.addEventListener("pointerup", () => {
    if (!dragging || !activeItem) return;
    dragging = false;

    const q    = questions[currentQ];
    const rect = scene.getBoundingClientRect();
    const W = rect.width;
    const bgImg = scene.querySelector(".bg");
    const H = bgImg.naturalWidth > 0
        ? W * (bgImg.naturalHeight / bgImg.naturalWidth)
        : rect.height;

    const itemL = parseFloat(activeItem.style.left) || 0;
    const itemT = parseFloat(activeItem.style.top)  || 0;
    const cx = ((itemL + activeItem.offsetWidth  / 2) / W) * 100;
    const cy = ((itemT + activeItem.offsetHeight / 2) / H) * 100;

    const z = q.zone;
    const inZone = cx > z.left && cx < z.right && cy > z.top && cy < z.bottom;

    if (inZone) {
        activeItem.style.transition = "left 0.3s ease, top 0.3s ease";
        activeItem.style.left   = (q.snap.left / 100 * W) + "px";
        activeItem.style.top    = (q.snap.top  / 100 * H) + "px";
        activeItem.style.cursor = "default";
        recordResult(currentQ);
        playCorrect();
        msgEl.innerHTML = "⭐ Great job!";
        setTimeout(() => { currentQ++; loadQuestion(currentQ); }, 900);
    } else {
        activeItem.style.left = "";
        activeItem.style.top  = "";
        qAttempts++;
        playWrong();
        msgEl.innerHTML = "❌ Try again!";
    }
    activeItem = null;
});

// ═══════════════════════════════════════════════
// 圈選邏輯
// ═══════════════════════════════════════════════

// 熱區點擊
document.querySelectorAll(".hotspot").forEach(hs => {
    hs.addEventListener("pointerdown", (e) => {
        e.stopPropagation();
        const q = questions[currentQ];
        if (q.type !== "tap") return;
        if (tapLocked) return;

        const isCorrect = q.targets.includes(hs.id);
        if (isCorrect) {
            tapLocked = true;
            hs.classList.add("correct");
            recordResult(currentQ);
            playCorrect();
            msgEl.innerHTML = "⭐ Great job!";
            setTimeout(() => { currentQ++; loadQuestion(currentQ); }, 900);
        } else {
            hs.classList.add("wrong");
            qAttempts++;
            playWrong();
            msgEl.innerHTML = "❌ Try again!";
            setTimeout(() => {
                hs.classList.remove("wrong");
                msgEl.textContent = "";
            }, 600);
        }
    });
});

// 畫面上的物件（bear / car / ball）在圈選題時也是干擾選項
document.querySelectorAll(".item").forEach(item => {
    item.addEventListener("pointerdown", (e) => {
        const q = questions[currentQ];
        if (q.type !== "tap") return;
        if (tapLocked) return;
        e.stopPropagation();
        qAttempts++;
        item.style.outline = "5px solid #e74c3c";
        item.style.borderRadius = "12px";
        playWrong();
        msgEl.innerHTML = "❌ Try again!";
        setTimeout(() => {
            item.style.outline = "";
            item.style.borderRadius = "";
            msgEl.textContent = "";
        }, 600);
    });
});

// ═══════════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════════
buildDots();
applyHotspotPositions();

// 記錄單題結果
function recordResult(n) {
    const seconds = ((Date.now() - qStartTime) / 1000).toFixed(1);
    qResults.push({
        question: questions[n].question,
        seconds:  parseFloat(seconds),
        attempts: qAttempts,
    });
}

// ═══════════════════════════════════════════════
// 顯示完成畫面 + 全新星星報告邏輯 (純數據精簡版)
// ═══════════════════════════════════════════════
const dataBtn   = document.getElementById("data-btn");
const dataPanel = document.getElementById("data-panel");
const dataTbody = document.getElementById("data-tbody");

// 工具函式：傳入數字 1~5，回傳對應的星星字串
function getStars(num) {
    let stars = "";
    for (let i = 1; i <= 5; i++) {
        stars += i <= num ? "★" : "☆";
    }
    return stars;
}

dataBtn.addEventListener("click", () => {
    // 隱藏完成獎狀，顯示報表
    finishEl.style.display = "none";
    dataTbody.innerHTML = "";
    
    // --- 1. 數據統計基礎 ---
    let totalSeconds = 0;
    let totalAttempts = 0;
    let dragAttempts = 0; // 專門統計拖曳題的錯誤
    let dragCount = 0;
    
    questions.forEach((q, idx) => {
        const r = qResults[idx];
        if (r) {
            totalSeconds += r.seconds;
            totalAttempts += r.attempts;
            if (q.type === "drag") {
                dragAttempts += r.attempts;
                dragCount++;
            }
        }
    });

    const totalQuestions = qResults.length || 1;
    const avgTime = totalSeconds / totalQuestions;

    // --- 2. 星星演算法判定 ---
    
    // [Vocabulary & Listening] 依據總錯誤次數判定
    let vocRating = 5;
    if (totalAttempts > 0 && totalAttempts <= 2) vocRating = 4;
    else if (totalAttempts > 2 && totalAttempts <= 4) vocRating = 3;
    else if (totalAttempts > 4) vocRating = 2;

    let listeningRating = vocRating; 

    // [Response Speed] 依據平均秒數判定
    let speedRating = 5;
    if (avgTime > 3 && avgTime <= 6) speedRating = 4;
    else if (avgTime > 6 && avgTime <= 10) speedRating = 3;
    else if (avgTime > 10) speedRating = 2;

    // [Following Directions] 依據拖曳題的錯誤次數判定
    let directionRating = 5;
    if (dragAttempts === 1) directionRating = 4;
    else if (dragAttempts > 1 && dragAttempts <= 3) directionRating = 3;
    else if (dragAttempts > 3) directionRating = 2;

    // --- 3. 動態渲染家長報告 UI ---
    const reportHeader = document.querySelector('.report-header');
    reportHeader.innerHTML = `
        <h2>📝 幼兒英語聽力與認知分析</h2>
        <p>透過直覺互動，我們觀察到孩子的學習亮點</p>
        
        <div style="background: #f8fafc; padding: 20px; border-radius: 16px; margin-top: 15px; border: 1px solid #e2e8f0; text-align: left;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px;">
                <span style="font-weight: bold; color: #475569;">Listening Skills</span>
                <span style="color: #f59e0b; font-weight: bold; letter-spacing: 2px;">${getStars(listeningRating)}</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px;">
                <span style="font-weight: bold; color: #475569;">Vocabulary</span>
                <span style="color: #f59e0b; font-weight: bold; letter-spacing: 2px;">${getStars(vocRating)}</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px;">
                <span style="font-weight: bold; color: #475569;">Response Speed</span>
                <span style="color: #f59e0b; font-weight: bold; letter-spacing: 2px;">${getStars(speedRating)}</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 15px;">
                <span style="font-weight: bold; color: #475569;">Following Directions</span>
                <span style="color: #f59e0b; font-weight: bold; letter-spacing: 2px;">${getStars(directionRating)}</span>
            </div>
        </div>

        <div style="margin-top: 20px; padding: 12px; background: rgba(239, 71, 111, 0.08); border-radius: 12px; border: 1px dashed #ef476f;">
            <div style="font-size: 13px; color: #64748b; font-weight: bold; text-transform: uppercase;">Recommended Level</div>
            <div style="font-weight: 900; color: #ef476f; font-size: 26px; margin-top: 4px; letter-spacing: 1px;">Starter A</div>
        </div>
    `;

    // --- 4. 產出下方逐題明細 (純數據版) ---
    qResults.forEach(r => {
        const tr = document.createElement("tr");
        
        let statusHtml = r.attempts === 0 
            ? `<span class="badge perfect">錯誤 0 次</span>` 
            : `<span class="badge learning">錯誤 ${r.attempts} 次</span>`;
            
        let speedIcon = r.seconds < 3 ? '⚡' : (r.seconds < 6 ? '👍' : '🐢');
        
        tr.innerHTML = `
            <td style="font-weight: 700;">${r.question}</td>
            <td><span class="speed">${speedIcon} ${r.seconds}s</span></td>
            <td>${statusHtml}</td>
        `;
        dataTbody.appendChild(tr);
    });
    
    dataPanel.classList.add("show");
});

document.getElementById("close-btn").addEventListener("click", () => {
    dataPanel.classList.remove("show");
    finishEl.style.display = "flex";
});

// ═══════════════════════════════════════════════
// 視窗縮放與響應式物件大小計算 (修正：補回漏掉的程式碼)
// ═══════════════════════════════════════════════
resizeItems();

window.addEventListener("resize", resizeItems);

function resizeItems() {
    const w = scene.offsetWidth;
    const bgImg = scene.querySelector(".bg");
    const h = bgImg.naturalWidth > 0
        ? w * (bgImg.naturalHeight / bgImg.naturalWidth)
        : scene.offsetHeight;

    const sizes = { bear: 0.25, car: 0.10, ball: 0.12 };
    Object.entries(sizes).forEach(([id, ratio]) => {
        const el = document.getElementById(id);
        if (!el) return;
        const placed = el.style.cursor === "default";
        el.style.width = (w * ratio) + "px";
        if (placed) {
            const q = questions.find(q => q.type === "drag" && q.itemId === id);
            if (q) {
                el.style.left = (q.snap.left / 100 * w) + "px";
                el.style.top  = (q.snap.top  / 100 * h) + "px";
            }
        }
    });
}

// START 按鈕：使用者點擊後解鎖音效，再載入第一題
document.getElementById("start-btn").addEventListener("click", () => {
    document.getElementById("start-screen").style.display = "none";
    loadQuestion(0);
});
</script>
