<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Etalking Kids - Placement Test (Dual Stage)</title>
<style>
* { box-sizing: border-box; }
body {
    margin: 0;
    padding: 0;
    background: #f0f4f8; 
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif; 
    text-align: center;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.header-area {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 10px 0;
    flex-shrink: 0;
    z-index: 10;
}
h1 {
    margin: 0;
    color: #4a5568;
    font-size: clamp(16px, 2.5vw, 26px);
    font-weight: 800;
}
#replay-btn {
    background: #ffffff;
    border: 2px solid #cbd5e1;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, background 0.2s;
}
#replay-btn:active { transform: scale(0.9); background: #f1f5f9; }

/* ── 擁抱 16:9 黃金比例容器 ── */
.scene {
    position: relative;
    width: min(100vw, 75dvh * 16 / 9); 
    aspect-ratio: 16 / 9;
    border-radius: 24px; 
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}
.bg {
    width: 100%;
    display: block;
}

/* ── 拖曳與靜態物件樣式 ── */
.item {
    position: absolute;
    touch-action: none;
    cursor: default;
    user-select: none;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: block; 
    -webkit-user-drag: none; /* 禁用內建圖片拖拽行為 */
    user-drag: none;
}
.item.draggable {
    cursor: grab;
}
.item.dragging {
    transform: scale(1.15);
    filter: drop-shadow(0 10px 15px rgba(14, 165, 233, 0.4));
    cursor: grabbing;
    z-index: 100;
}
.item.jump {
    animation: toyJump 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) 2;
}

@keyframes toyJump {
    0%, 100% { transform: scale(1) translateY(0); }
    50% { transform: scale(1.08, 0.92) translateY(-30px); }
}

/* ── 圈選熱區 ── */
.hotspot {
    position: absolute;
    cursor: pointer;
    border-radius: 50%;
    display: none;
    box-sizing: border-box;
    border: 3px dashed transparent;
    z-index: 50; 
}
.hotspot.active { display: block; }
.hotspot.correct {
    border: 5px solid #10b981;
    background: rgba(16,185,129,0.15);
    animation: pulse 0.4s ease;
    cursor: default;
}
.hotspot.wrong {
    border: 5px solid #ef476f;
    background: rgba(239,71,111,0.15);
    animation: shake 0.4s ease;
}
@keyframes pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.06); }
    100% { transform: scale(1); }
}
@keyframes shake {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-6px); }
    75%     { transform: translateX(6px); }
}

/* ── 訊息 ── */
#message {
    font-size: clamp(18px, 3vw, 26px);
    font-weight: bold;
    margin: 8px;
    min-height: 36px;
    color: #10b981;
}

/* ── 進度點 ── */
#progress {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 12px 0 6px;
    flex-wrap: wrap;
}
.dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #e2e8f0;
    transition: all 0.3s ease;
    border: 2px solid #cbd5e1;
}
.dot.done   { background: #10b981; border-color: #10b981; transform: scale(1.1); }
.dot.active { background: #f59e0b; border-color: #f59e0b; box-shadow: 0 0 10px rgba(245,158,11,0.5); }

/* ── 開始畫面 ── */
#start-screen {
    position: fixed;
    inset: 0;
    background: #f8fafc;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
}
#start-btn {
    font-size: clamp(24px, 4vw, 38px);
    font-weight: bold;
    padding: 20px 60px;
    border-radius: 50px;
    border: none;
    background: #f59e0b;
    color: white;
    cursor: pointer;
    box-shadow: 0 8px 0 #b47b05, 0 15px 20px rgba(245,158,11,0.3);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 2px;
}
#start-btn:active {
    transform: translateY(6px);
    box-shadow: 0 2px 0 #b47b05, 0 5px 10px rgba(245,158,11,0.3);
}

/* ── 晉級過渡畫面 ── */
#next-stage-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(248, 250, 252, 0.96);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 998;
    animation: fadeIn 0.4s ease;
}
#next-stage-btn {
    font-size: clamp(20px, 3.5vw, 32px);
    font-weight: bold;
    padding: 18px 45px;
    border-radius: 50px;
    border: none;
    background: #06d6a0;
    color: white;
    cursor: pointer;
    box-shadow: 0 8px 0 #04a379, 0 15px 20px rgba(6, 214, 160, 0.3);
    transition: all 0.1s;
    margin-top: 20px;
}
#next-stage-btn:active {
    transform: translateY(6px);
    box-shadow: 0 2px 0 #04a379, 0 5px 10px rgba(6, 214, 160, 0.3);
}

/* ── 完成畫面 ── */
#finish {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    flex-direction: column;
    align-items: center;
    gap: 20px;
    background: #ffffff;
    padding: 50px 40px 40px;
    border-radius: 40px;
    border: 8px solid #ffd166;
    box-shadow: 0 25px 50px rgba(255, 166, 0, 0.2), inset 0 0 0 8px #fff9e6;
    z-index: 999;
    width: 90vw;
    max-width: 450px;
}
.ribbon {
    position: absolute;
    top: -25px;
    background: #ef476f;
    color: white;
    padding: 10px 30px;
    border-radius: 30px;
    font-size: clamp(18px, 4vw, 24px);
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(239, 71, 111, 0.4);
}
.stars {
    font-size: clamp(40px, 8vw, 60px);
    letter-spacing: 5px;
}
.finish-text {
    font-size: clamp(22px, 4vw, 32px);
    color: #06d6a0;
    font-weight: 900;
    margin-bottom: 10px;
}
#data-btn {
    display: none;
    background: linear-gradient(180deg, #118ab2 0%, #0c637f 100%);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 16px 36px;
    font-size: clamp(16px, 3vw, 20px);
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 8px 0 #073b4c, 0 15px 20px rgba(17, 138, 178, 0.4);
    transition: all 0.1s ease;
    display: flex;
    align-items: center;
    gap: 10px;
}
#data-btn:active {
    transform: translateY(8px);
    box-shadow: 0 0 0 #073b4c, 0 5px 10px rgba(17, 138, 178, 0.4);
}

/* ── 數據面板 ── */
#data-panel {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(5px);
    z-index: 2000;
    align-items: center;
    justify-content: center;
}
#data-panel.show { display: flex; }
#data-inner {
    background: #ffffff;
    border-radius: 24px;
    padding: 35px 40px;
    max-width: 650px;
    width: 90vw;
    max-height: 85dvh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 25px 50px rgba(0,0,0,0.15);
}
.report-header { text-align: center; margin-bottom: 20px; }
.report-header h2 { margin: 0 0 8px; font-size: clamp(20px, 4vw, 26px); color: #1e293b; }
.report-header p { margin: 0; color: #64748b; font-size: 15px; }
.table-container { overflow-y: auto; border-radius: 12px; border: 1px solid #e2e8f0; }
#data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
#data-table th { background: #f8fafc; padding: 12px 14px; text-align: left; color: #475569; font-weight: 700; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; }
#data-table td { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; color: #334155; vertical-align: middle; }
.badge { padding: 4px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; white-space: nowrap; }
.badge.perfect { background: #dcfce7; color: #166534; }
.badge.learning { background: #fef9c3; color: #854d0e; }
.speed { font-weight: 600; color: #0ea5e9; white-space: nowrap; }
#close-btn { margin-top: 25px; padding: 14px; border-radius: 12px; border: 2px solid #e2e8f0; background: transparent; color: #475569; font-size: 16px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
#close-btn:hover { background: #f1f5f9; color: #0f172a; }

body.finished .scene, body.finished .header-area, body.finished #progress, body.finished #message {
    opacity:.25; transition: opacity .5s ease;
}
</style>
</head>
<body>

<div id="start-screen">
    <button id="start-btn">START TEST</button>
</div>

<div id="next-stage-screen">
    <h2 style="font-size: 36px; color: #10b981; margin: 0;">🌟 Awesome! 🌟</h2>
    <p style="font-size: 22px; color: #475569; margin: 10px 0 20px;">You unlocked the next stage: The Sunny Park! 🛝</p>
    <button id="next-stage-btn">Go to the Park! ➔</button>
</div>

<div id="progress"></div>

<div class="header-area">
    <button id="replay-btn" title="Listen again">🔊</button>
    <h1 id="question"></h1>
</div>

<div class="scene" id="scene">
    <img class="bg" id="game-bg" src="room_background.png">

    <img id="bear"        class="item" src="bear_v3.png">
    <img id="bear_green"  class="item" src="bear_green.png">
    <img id="bear_yellow" class="item" src="bear_yellow.png">
    <img id="car"         class="item" src="car.png">
    <img id="ball"        class="item" src="ball.png">

    <div class="hotspot" id="hs-1"></div>
    <div class="hotspot" id="hs-2"></div>
    <div class="hotspot" id="hs-3"></div>
    <div class="hotspot" id="hs-4"></div>
    <div class="hotspot" id="hs-5"></div>
    <div class="hotspot" id="hs-6"></div>
    <div class="hotspot" id="hs-7"></div>
    <div class="hotspot" id="hs-8"></div>
    <div class="hotspot" id="hs-9"></div>
</div>

<div id="message"></div>

<div id="finish">
    <div class="ribbon" id="finish-ribbon">Test Completed!</div>
    <div class="stars">⭐⭐⭐⭐⭐</div>

<div id="data-panel">
  <div id="data-inner">

          <thead>
            <tr>
              <th>場景</th>
              <th>聽力指令 / 題目</th>
              <th>反應速度</th>
              <th>理解力指標</th>
            </tr>
          </thead>
          <tbody id="data-tbody"></tbody>
        </table>
    </div>
    <button id="close-btn">完成並關閉</button>
  </div>
</div>

<script>
let currentStage = 1; // 1 = 房間, 2 = 公園
let currentQ     = 0;
let dragging     = false;
let activeItem   = null;
let offsetX = 0, offsetY = 0;
let tapLocked    = false;
let qStartTime   = 0;
let qAttempts    = 0;
const allResults = []; 

// ═══════════════════════════════════════════════
// 📦 雙關卡核心架構（精準對齊您微調的熊熊大小與房間位置）
// ═══════════════════════════════════════════════
const STAGE_CONFIGS = {
    1: {
        bg: "room_background.png",
        // 精確帶入您微調的房間初始位置 
        itemPositions: {
            bear:        { left: "42%", top: "70%" },
            bear_green:  { left: "70%", top: "81%" },
            bear_yellow: { left: "73%", top: "50%" },
            car:         { left: "30%", top: "68%" },
            ball:        { left: "90%", top: "88%" }
        },
        // 精確帶入您微調的房間熱區對齊
        hotspots: {
            "hs-1": { name: "hs-sun",         left: 2,  top: 24, width: 13, height: 20 },
            "hs-2": { name: "hs-door",        left: 12, top: 10, width: 28, height: 75 },
            "hs-3": { name: "hs-books",       left: 68, top: 50, width: 22, height: 48 },
            "hs-4": { name: "hs-window",      left: 82, top: 8,  width: 17, height: 45 },
            "hs-5": { name: "hs-cloud",       left: 36, top: 0,  width: 22, height: 18 },
            "hs-6": { name: "hs-bear",        left: 48, top: 69, width: 15, height: 27 },
            "hs-7": { name: "hs-bear-green",  left: 69, top: 80, width: 10, height: 18 },
            "hs-8": { name: "hs-bear-yellow", left: 72, top: 49, width: 10, height: 18 },
            "hs-9": { name: "hs-car",         left: 29, top: 69, width: 10, height: 10 }
        },
        questions: [
            { type: "tap", question: "Can you find the sun? ☀️", audio: "q4.mp3", targets: ["hs-1"], decoys: ["hs-2","hs-3","hs-4","hs-5","hs-6","hs-7","hs-8","hs-9"] },
            { type: "tap", question: "Where is the door? 🚪", audio: "q5.mp3", targets: ["hs-2"], decoys: ["hs-1","hs-3","hs-4","hs-5","hs-6","hs-7","hs-8","hs-9"] },
            { type: "tap", question: "Can you find the books? 📚", audio: "q6.mp3", targets: ["hs-3"], decoys: ["hs-1","hs-2","hs-4","hs-5","hs-6","hs-7","hs-8","hs-9"] },
            { type: "tap", question: "Where is the window? 🪟", audio: "q7.mp3", targets: ["hs-4"], decoys: ["hs-1","hs-2","hs-3","hs-5","hs-6","hs-7","hs-8","hs-9"] },
            { type: "tap", question: "Can you find the cloud? ☁️", audio: "q8.mp3", targets: ["hs-5"], decoys: ["hs-1","hs-2","hs-3","hs-4","hs-6","hs-7","hs-8","hs-9"] },
            { type: "tap", question: "Touch the BLUE bear! 🧸🟦", audio: "q9.mp3", targets: ["hs-6"], decoys: ["hs-7","hs-8","hs-9","hs-1","hs-2","hs-4"] },
            { type: "tap", question: "Can you find the RED ball? 🔴", audio: "q10.mp3", targets: ["hs-5"], decoys: ["hs-6","hs-7","hs-8"] }, // 同步您補上的新音檔
            { type: "tap", question: "Where is the YELLOW window? 🟨", audio: "q11.mp3", targets: ["hs-4"], decoys: ["hs-1","hs-2","hs-3"] },
            { type: "drag", itemId: "bear", question: "Can you put the BLUE bear on the rug? 🧸", audio: "q1.mp3", zone: { left: 0, right: 50, top: 55, bottom: 100 }, snap: { left: 8, top: 68 } },
            { type: "drag", itemId: "car", question: "Can you put the car on the table? 🚗", audio: "q2.mp3", zone: { left: 44, right: 70, top: 45, bottom: 68 }, snap: { left: 53, top: 54 } },
            { type: "drag", itemId: "ball", question: "Can you put the ball in front of the table? ⚽", audio: "q3.mp3", zone: { left: 48, right: 74, top: 66, bottom: 90 }, snap: { left: 52, top: 70 } }
        ]
    },
    2: {
        bg: "park.jpeg",
        // 公園草地擺放位置（同步將綠熊、黃熊移到草地上更自然的並排處）
        itemPositions: {
            bear:        { left: "35%", top: "76%" },
            bear_green:  { left: "45%", top: "79%" },
            bear_yellow: { left: "55%", top: "79%" },
            car:         { left: "20%", top: "76%" },
            ball:        { left: "70%", top: "80%" }
        },
        // 對齊 16:9 公園場景熱區定義
        hotspots: {
            "hs-1": { name: "hs-sun",     left: 5,  top: 5,  width: 9,  height: 16 }, 
            "hs-2": { name: "hs-slide",   left: 5,  top: 22, width: 25, height: 40 }, 
            "hs-3": { name: "hs-tree",    left: 20, top: 2,  width: 30, height: 52 }, 
            "hs-4": { name: "hs-swing",   left: 50, top: 27, width: 23, height: 32 }, 
            "hs-5": { name: "hs-seesaw",  left: 35, top: 56, width: 23, height: 16 }, 
            "hs-6": { name: "hs-sandbox", left: 73, top: 54, width: 24, height: 16 }, 
            "hs-7": { name: "hs-cloud",   left: 51, top: 6,  width: 13, height: 11 },
            "hs-8": { name: "hs-empty1",  left: 0,  top: 0,  width: 0,  height: 0 }, 
            "hs-9": { name: "hs-empty2",  left: 0,  top: 0,  width: 0,  height: 0 }
        },
        questions: [
            { type: "tap", question: "Can you find the slide? 🛝", audio: "p_slide.mp3", targets: ["hs-2"], decoys: ["hs-1","hs-3","hs-4","hs-5","hs-6","hs-7"] },
            { type: "tap", question: "Where is the swing? 🎡", audio: "p_swing.mp3", targets: ["hs-4"], decoys: ["hs-2","hs-1","hs-3","hs-5","hs-6","hs-7"] },
            { type: "tap", question: "Can you find the seesaw? ⚖️", audio: "p_seesaw.mp3", targets: ["hs-5"], decoys: ["hs-2","hs-4","hs-1","hs-3","hs-6","hs-7"] },
            { type: "tap", question: "Where is the sandbox? ⏳", audio: "p_sandbox.mp3", targets: ["hs-6"], decoys: ["hs-2","hs-4","hs-5","hs-1","hs-3","hs-7"] },
            { type: "tap", question: "Can you find the big tree? 🌳", audio: "p_tree.mp3", targets: ["hs-3"], decoys: ["hs-2","hs-4","hs-5","hs-6","hs-1","hs-7"] },
            { type: "drag", itemId: "bear", question: "Can you put the BLUE bear ON the swing? 🧸", audio: "p_drag_bear.mp3", zone: { left: 45, right: 75, top: 25, bottom: 65 }, snap: { left: 58, top: 41 } },
            { type: "drag", itemId: "car", question: "Can you put the car UNDER the slide? 🚗", audio: "p_drag_car.mp3", zone: { left: 2, right: 32, top: 50, bottom: 85 }, snap: { left: 14, top: 56 } },
            { type: "drag", itemId: "ball", question: "Can you put the ball IN the sandbox? ⚽", audio: "p_drag_ball.mp3", zone: { left: 70, right: 98, top: 50, bottom: 85 }, snap: { left: 81, top: 58 } }
        ]
    }
};

function applyStageUI(stage) {
    const cfg = STAGE_CONFIGS[stage];
    gameBgEl.src = cfg.bg;
    
    // 初始化玩具初始擺放位置
    Object.entries(cfg.itemPositions).forEach(([id, pos]) => {
        const el = document.getElementById(id);
        if (el) {
            el.style.left = pos.left;
            el.style.top = pos.top;
            el.style.cursor = "default";
            el.classList.remove("draggable", "jump");
        }
    });

    // 刷新熱區定義
    Object.entries(cfg.hotspots).forEach(([htmlId, def]) => {
        const el = document.getElementById(htmlId);
        if (el) {
            el.style.left   = def.left   + "%";
            el.style.top    = def.top    + "%";
            el.style.width  = def.width  + "%";
            el.style.height = def.height + "%";
        }
    });
    
    buildDots();
    resizeItems();
}

function loadQuestion(n) {
    document.querySelectorAll(".hotspot").forEach(el => {
        el.classList.remove("active", "correct", "wrong");
        el.style.pointerEvents = "auto"; 
    });
    
    document.querySelectorAll(".item").forEach(el => el.classList.remove("draggable"));
    msgEl.textContent = "";
    tapLocked = false;

    const activeQuestions = STAGE_CONFIGS[currentStage].questions;

    if (n >= activeQuestions.length) {
        handleStageComplete();
        return;
    }

    const q = activeQuestions[n];
    questionEl.textContent = q.question;
    updateDots(n);
    
    setTimeout(() => playQuestion(currentStage, n), 300);

    qStartTime = Date.now();
    qAttempts  = 0;

    if (q.type === "drag") {
        document.querySelectorAll(".hotspot").forEach(hsEl => hsEl.style.pointerEvents = "none");

        const el = document.getElementById(q.itemId);
        if (el && el.style.cursor !== "default") {
            el.classList.add("draggable");
        }
    } else {
        [...q.targets, ...q.decoys].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.classList.add("active");
        });
    }
}

function handleStageComplete() {
    if (currentStage === 1) {
        const stage1Results = allResults.filter(r => r.stage === 1);
        const totalCorrect = stage1Results.length; 

        // 🌟 晉級機制：房間完成 5 題以上順利解鎖公園
        if (totalCorrect >= 5) {
            document.getElementById("next-stage-screen").style.display = "flex";
        } else {
            showFinalEnd("Starter A", "Room Stage Finished!");
        }
    } else {
        showFinalEnd("Starter B", "All Stages Cleared!");
    }
}

document.getElementById("next-stage-btn").addEventListener("click", () => {
    document.getElementById("next-stage-screen").style.display = "none";
    currentStage = 2;
    currentQ = 0;
    applyStageUI(2);
    loadQuestion(0);
});

function showFinalEnd(level, titleText) {
    document.body.classList.add("finished");
    document.querySelector(".header-area").style.display = "none";
    progressEl.style.display = "none";
    
    finishEl.style.display = "flex";
    document.getElementById("data-btn").style.display = "flex";
    document.getElementById("finish-title").textContent = titleText;
    document.getElementById("finish-ribbon").textContent = "Recommended: " + level;
}

// ── 拖曳邏輯 ──
document.querySelectorAll(".item").forEach(item => {
    item.addEventListener("pointerdown", (e) => {
        const activeQuestions = STAGE_CONFIGS[currentStage].questions;
        const q = activeQuestions[currentQ];
        if (!q || q.type !== "drag") return;
        if (item.id !== q.itemId) return;
        if (item.style.cursor === "default") return;

        dragging   = true;
        activeItem = item;
        offsetX    = e.offsetX;
        offsetY    = e.offsetY;
        item.classList.add("dragging"); 
        item.setPointerCapture(e.pointerId);
    });
});

window.addEventListener("pointermove", (e) => {
    if (!dragging || !activeItem) return;
    const rect = scene.getBoundingClientRect();
    activeItem.style.left = (e.clientX - rect.left - offsetX) + "px";
    activeItem.style.top  = (e.clientY - rect.top  - offsetY) + "px";
});

window.addEventListener("pointerup", () => {
    if (!dragging || !activeItem) return;
    dragging = false;
    activeItem.classList.remove("dragging");

    const activeQuestions = STAGE_CONFIGS[currentStage].questions;
    const q    = activeQuestions[currentQ];
    const rect = scene.getBoundingClientRect();
    const W = rect.width;
    const bgImg = scene.querySelector(".bg");
    const H = bgImg.naturalWidth > 0 ? W * (bgImg.naturalHeight / bgImg.naturalWidth) : rect.height;

    const itemL = parseFloat(activeItem.style.left) || 0;
    const itemT = parseFloat(activeItem.style.top)  || 0;
    const cx = ((itemL + activeItem.offsetWidth  / 2) / W) * 100;
    const cy = ((itemT + activeItem.offsetHeight / 2) / H) * 100;

    const z = q.zone;
    const inZone = cx > z.left && cx < z.right && cy > z.top && cy < z.bottom;

    if (inZone) {
        const targetToy = activeItem; 
        targetToy.style.transition = "left 0.3s ease, top 0.3s ease";
        targetToy.style.left   = (q.snap.left / 100 * W) + "px";
        targetToy.style.top    = (q.snap.top  / 100 * H) + "px";
        targetToy.style.cursor = "default";
        targetToy.classList.remove("draggable");
        
        recordResult();
        playCorrect();
        msgEl.innerHTML = "⭐ Great job!";
        
        setTimeout(() => { targetToy.classList.add("jump"); }, 150);

        setTimeout(() => { 
            targetToy.classList.remove("jump");
            currentQ++; 
            loadQuestion(currentQ); 
        }, 1100);
    } else {
        activeItem.style.left = "";
        activeItem.style.top  = "";
        qAttempts++;
        playWrong();
        msgEl.innerHTML = "❌ Try again!";
    }
    activeItem = null;
});

// ── 圈選點擊邏輯 ──
document.querySelectorAll(".hotspot").forEach(hs => {
    hs.addEventListener("pointerdown", (e) => {
        e.stopPropagation();
        const activeQuestions = STAGE_CONFIGS[currentStage].questions;
        const q = activeQuestions[currentQ];
        if (!q || q.type !== "tap") return;
        if (tapLocked) return;

        const isCorrect = q.targets.includes(hs.id);
        if (isCorrect) {
            tapLocked = true;
            hs.classList.add("correct");
            recordResult();
            playCorrect();
            msgEl.innerHTML = "⭐ Great job!";
            setTimeout(() => { currentQ++; loadQuestion(currentQ); }, 900);
        } else {
            hs.classList.add("wrong");
            qAttempts++;
            playWrong();
            msgEl.innerHTML = "❌ Try again!";
            setTimeout(() => {
                hs.classList.remove("wrong");
                msgEl.textContent = "";
            }, 600);
        }
    });
});

function recordResult() {
    const activeQuestions = STAGE_CONFIGS[currentStage].questions;
    const seconds = ((Date.now() - qStartTime) / 1000).toFixed(1);
    allResults.push({
        stage: currentStage,
        question: activeQuestions[currentQ].question,
        seconds:  parseFloat(seconds),
        attempts: qAttempts,
    });
}

// ── 豪華雙關卡數據面板大總結 ──
const dataBtn   = document.getElementById("data-btn");
const dataPanel = document.getElementById("data-panel");
const dataTbody = document.getElementById("data-tbody");

dataBtn.addEventListener("click", () => {
    finishEl.style.display = "none";
    dataTbody.innerHTML = "";
    
    let totalSeconds = 0;
    let totalAttempts = 0;
    
    allResults.forEach(r => {
        totalSeconds += r.seconds;
        totalAttempts += r.attempts;
    });

    const totalQuestions = allResults.length || 1;
    const avgTime = totalSeconds / totalQuestions;

    let vocRating = 5;
    if (totalAttempts > 1 && totalAttempts <= 3) vocRating = 4;
    else if (totalAttempts > 3 && totalAttempts <= 5) vocRating = 3;
    else if (totalAttempts > 5) vocRating = 2;

    let speedRating = 5;
    if (avgTime > 3 && avgTime <= 6) speedRating = 4;
    else if (avgTime > 6 && avgTime <= 10) speedRating = 3;
    else if (avgTime > 10) speedRating = 2;

    const finalLevel = (currentStage === 2) ? "Starter B" : "Starter A";
    const finalColor = (currentStage === 2) ? "#06d6a0" : "#ef476f";

    document.getElementById("report-summary-box").innerHTML = `
        <h2>📝 幼兒英語聽力與綜合認知分析</h2>
        <p>透過直覺互動，雙場景追蹤孩子的學習特徵</p>
        <div style="background: #f8fafc; padding: 18px; border-radius: 16px; margin-top: 15px; border: 1px solid #e2e8f0; text-align: left;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px;">
                <span style="font-weight: bold; color: #475569;">Listening Skills (聽力理解)</span>
                <span style="color: #f59e0b; font-weight: bold; letter-spacing: 2px;">${getStars(vocRating)}</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px;">
                <span style="font-weight: bold; color: #475569;">Vocabulary & Color (單字特徵)</span>
                <span style="color: #f59e0b; font-weight: bold; letter-spacing: 2px;">${getStars(vocRating)}</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 14px;">
                <span style="font-weight: bold; color: #475569;">Response Speed (反應速度)</span>
                <span style="color: #f59e0b; font-weight: bold; letter-spacing: 2px;">${getStars(speedRating)}</span>
            </div>
        </div>
        <div style="margin-top: 15px; padding: 10px; background: rgba(15, 23, 42, 0.04); border-radius: 12px; border: 1px dashed #cbd5e1;">
            <div style="font-size: 12px; color: #64748b; font-weight: bold;">RECOMMENDED LEVEL</div>
            <div style="font-weight: 900; color: ${finalColor}; font-size: 28px; margin-top: 2px;">${finalLevel}</div>
        </div>
    `;

    allResults.forEach(r => {
        const tr = document.createElement("tr");
        const stageName = r.stage === 1 ? "🏠 房間" : "🛝 公園";
        let statusHtml = r.attempts === 0 ? `<span class="badge perfect">錯誤 0 次</span>` : `<span class="badge learning">錯誤 ${r.attempts} 次</span>`;
        let speedIcon = r.seconds < 3 ? '⚡' : (r.seconds < 6 ? '👍' : '🐢');
        
        tr.innerHTML = `
            <td style="color: #64748b; font-weight: bold;">${stageName}</td>
            <td style="font-weight: 700;">${r.question}</td>
            <td><span class="speed">${speedIcon} ${r.seconds}s</span></td>
            <td>${statusHtml}</td>
        `;
        dataTbody.appendChild(tr);
    });
    dataPanel.classList.add("show");
});

function getStars(num) {
    let stars = "";
    for (let i = 1; i <= 5; i++) { stars += i <= num ? "★" : "☆"; }
    return stars;
}

document.getElementById("close-btn").addEventListener("click", () => {
    dataPanel.classList.remove("show");
    finishEl.style.display = "flex";
});

// ── 響應式等比例縮放（完美同步您調校的 0.08 比例） ──
window.addEventListener("resize", resizeItems);

function resizeItems() {
    const w = scene.offsetWidth;
    const bgImg = scene.querySelector(".bg");
    const h = bgImg.naturalWidth > 0 ? w * (bgImg.naturalHeight / bgImg.naturalWidth) : scene.offsetHeight;
    
    // 🔥 完全保留您微調後的精緻 0.08 比例
    const sizes = { bear: 0.25, bear_green: 0.08, bear_yellow: 0.08, car: 0.10, ball: 0.12 };
    Object.entries(sizes).forEach(([id, ratio]) => {
        const el = document.getElementById(id);
        if (!el) return;
        
        const placed = el.style.cursor === "default";
        el.style.width = (w * ratio) + "px";
        
        if (placed) {
            const activeQuestions = STAGE_CONFIGS[currentStage].questions;
            const q = activeQuestions.find(q => q.type === "drag" && q.itemId === id);
            if (q) {
                el.style.left = (q.snap.left / 100 * w) + "px";
                el.style.top  = (q.snap.top  / 100 * h) + "px";
            }
        }
    });
}

// 初始化與啟動
function buildDots() {
    progressEl.innerHTML = "";
    const activeQuestions = STAGE_CONFIGS[currentStage].questions;
    activeQuestions.forEach((_, i) => {
        const d = document.createElement("div");
        d.className = "dot";
        d.id = "dot" + i;
        progressEl.appendChild(d);
    });
}

function updateDots(current) {
    const activeQuestions = STAGE_CONFIGS[currentStage].questions;
    activeQuestions.forEach((_, i) => {
        const dot = document.getElementById("dot" + i);
        if (!dot) return;
        dot.className = "dot";
        if (i < current)   dot.classList.add("done");
        if (i === current) dot.classList.add("active");
    });
}

document.getElementById("start-btn").addEventListener("click", () => {
    document.getElementById("start-screen").style.display = "none";
    applyStageUI(1);
    loadQuestion(0);
});
</script>
