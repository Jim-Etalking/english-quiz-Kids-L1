<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drag the Bear</title>

<style>

body{
    margin:0;
    background:#f3f6fb;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin:20px 0;
    color:#333;
}

.scene{
    position:relative;
    width:90vw;
    max-width:900px;
    margin:auto;
}

.bg{
    width:100%;
    display:block;
}

#bear{
    position:absolute;
    width:clamp(150px, 20vw, 240px);

    left:40%;
    top:82%;

    touch-action:none;
    cursor:grab;
    user-select:none;

    transition: left 0.3s ease, top 0.3s ease;

}

#message{
    font-size:28px;
    font-weight:bold;
    margin:20px;
    color:#2a7d2e;
}

</style>
</head>
<body>

<h1>Put the bear on the rug.</h1>

<div class="scene" id="scene">

    <img class="bg" src="room_background.png">

    <img id="bear" src="bear_v3.png">

</div>

<div id="message"></div>


<script>

const bear = document.getElementById("bear");
const scene = document.getElementById("scene");
const msg = document.getElementById("message");

let dragging = false;
let offsetX = 0;
let offsetY = 0;


bear.addEventListener("pointerdown",(e)=>{

    dragging = true;

    offsetX = e.offsetX;
    offsetY = e.offsetY;

});


window.addEventListener("pointermove",(e)=>{

    if(!dragging) return;

    const rect = scene.getBoundingClientRect();

    let x = e.clientX - rect.left - offsetX;
    let y = e.clientY - rect.top - offsetY;

    bear.style.left = x + "px";
    bear.style.top  = y + "px";

});


window.addEventListener("pointerup",()=>{

    if(!dragging) return;

    dragging = false;

    const x = parseFloat(bear.style.left);
    const y = parseFloat(bear.style.top);

    // 🧸 地毯成功區（你可以微調）
    const isOnRug =
        x > 30 &&
        x < 300 &&
        y > 280 &&
        y < 550;

    if(isOnRug){

        // ⭐ 吸附到地毯中心位置
        bear.style.left = "160px";
        bear.style.top  = "200px";

        // 🎯 成功提示
        msg.innerHTML = "⭐ Great! The bear is on the rug!";

        // 🔒 鎖定（避免再拖）
        bear.style.cursor = "default";

    }else{

        // ❌ 沒放對 → 回原位（可選）
        bear.style.left = "40%";
        bear.style.top  = "82%";

        msg.innerHTML = "";

    }
});

</script>

</body>
</html>
