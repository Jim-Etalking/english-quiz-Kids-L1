<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Drag the Toys</title>
<style>
* { box-sizing: border-box; }
body {
    margin: 0;
    padding: 0;
    background: #c8dff0;
    font-family: Arial, sans-serif;
    text-align: center;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
h1 {
    margin: 6px 0 2px;
    color: #333;
    font-size: clamp(16px, 2.5vw, 30px);
    font-weight: bold;
    flex-shrink: 0;
}
.scene {
    position: relative;
    /* 寬跟高都限制，讓瀏覽器自動選小的那個 */
    width: min(100vw, 80dvh * 1456 / 816);
    aspect-ratio: 1456 / 816;
}
.bg {
    width: 100%;
    display: block;
}

/* ── 拖曳物件 ── */
.item {
    position: absolute;
    touch-action: none;
    cursor: grab;
    user-select: none;
    transition: none;
    display: none;
}
.item.active { display: block; }

#bear { left: 38%; top: 68%; }
#car  { left: 38%; top: 68%; }
#ball { left: 38%; top: 68%; }

/* ── 圈選熱區 ── */
.hotspot {
    position: absolute;
    cursor: pointer;
    border-radius: 50%;
    display: none;
    box-sizing: border-box;
    border: 3px dashed transparent;
}
.hotspot.active { display: block; }
.hotspot.correct {
    border: 5px solid #2a7d2e;
    background: rgba(42,125,46,0.18);
    animation: pulse 0.4s ease;
    cursor: default;
}
.hotspot.wrong {
    border: 5px solid #e74c3c;
    background: rgba(231,76,60,0.18);
    animation: shake 0.4s ease;
}
@keyframes pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.08); }
    100% { transform: scale(1); }
}
@keyframes shake {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-6px); }
    75%     { transform: translateX(6px); }
}

/* ── 訊息 ── */
#message {
    font-size: clamp(18px, 3vw, 28px);
    font-weight: bold;
    margin: 6px;
    min-height: 36px;
    color: #2a7d2e;
}

/* ── 進度點 ── */
#progress {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 6px 0;
    flex-wrap: wrap;
}
.dot {
    width: 13px; height: 13px;
    border-radius: 50%;
    background: #ccc;
    transition: background 0.3s;
}
.dot.done   { background: #2a7d2e; }
.dot.active { background: #f5a623; }

/* ── 開始畫面 ── */
#start-screen {
    position: fixed;
    inset: 0;
    background: #f3f6fb;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
}
#start-btn {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: bold;
    padding: 24px 64px;
    border-radius: 50px;
    border: none;
    background: #f5a623;
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 0 #c47d0e;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 4px;
}
#start-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #c47d0e;
}

/* ── 完成畫面 ── */
#finish {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    flex-direction: column;
    align-items: center;
    gap: 18px;
    background: rgba(255,255,255,0.92);
    padding: 40px 50px;
    border-radius: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    z-index: 999;
    animation: pop 0.5s ease;
}

.finish-title {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: bold;
    color: #ff8c42;
}

.stars {
    font-size: clamp(28px, 5vw, 50px);
}

.finish-text {
    font-size: clamp(18px, 3vw, 28px);
    color: #666;
    font-weight: bold;
}
#data-btn {
    display: none;

    background: linear-gradient(135deg,#ffb347,#ff8c42);
    color: white;

    border: none;
    border-radius: 999px;

    padding: 16px 42px;

    font-size: clamp(18px,2.5vw,24px);
    font-weight: bold;

    cursor: pointer;

    box-shadow: 0 8px 18px rgba(255,140,66,.35);

    transition: all .2s ease;
}

#data-btn:hover {
    transform: translateY(-2px);
}

#data-btn:active {
    transform: scale(0.96);
    box-shadow: 0 4px 10px rgba(255,140,66,.35);
}
/* 數據面板 */
#data-panel {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
}
#data-panel.show { display: flex; }
#data-inner {
    background: #fff;
    border-radius: 16px;
    padding: 24px 32px;
    max-width: 500px;
    width: 90vw;
    max-height: 80dvh;
    overflow-y: auto;
}
#data-inner h2 {
    margin: 0 0 16px;
    font-size: 20px;
    color: #333;
}
#data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}
#data-table th {
    background: #f1f5f9;
    padding: 8px 10px;
    text-align: left;
    color: #555;
    font-weight: 600;
}
#data-table td {
    padding: 8px 10px;
    border-bottom: 1px solid #e5e7eb;
    color: #333;
}
#data-table tr:last-child td { border-bottom: none; }
#close-btn {
    margin-top: 16px;
    padding: 10px 28px;
    border-radius: 50px;
    border: none;
    background: #e5e7eb;
    color: #333;
    font-size: 15px;
    cursor: pointer;
    font-weight: bold;
}

body.finished .scene,
body.finished #question,
body.finished #progress,
body.finished #message {
    opacity:.25;
    transition: opacity .5s ease;
}

@keyframes pop {
    0%   { transform: scale(0.5); opacity: 0; }
    70%  { transform: scale(1.15); }
    100% { transform: scale(1);   opacity: 1; }
}
</style>
</head>
<body>

<!-- 開始畫面 -->
<div id="start-screen">
    <button id="start-btn">START</button>
</div>

<!-- 進度 -->
<div id="progress"></div>
<!-- 題目 -->
<h1 id="question"></h1>

<!-- 場景 -->
<div class="scene" id="scene">
    <img class="bg" src="room_background.png">

    <!-- 拖曳物件 -->
    <img id="bear" class="item" src="bear_v3.png">
    <img id="car"  class="item" src="car.png">
    <img id="ball" class="item" src="ball.png">

    <!-- 圈選熱區（位置用百分比，由 JS 套用） -->
    <div class="hotspot" id="hs-sun"></div>
    <div class="hotspot" id="hs-door"></div>
    <div class="hotspot" id="hs-books"></div>
    <div class="hotspot" id="hs-window"></div>
    <div class="hotspot" id="hs-cloud"></div>
</div>

<!-- 訊息 / 完成 -->
<div id="message"></div>
<div id="finish">
    <div class="finish-title">🎉 Great Job! 🎉</div>
    <div class="stars">⭐⭐⭐⭐⭐</div>
    <div class="finish-text">You are so smart!</div>

    <button id="data-btn">📈 Parent Report</button>
</div>

<!-- 數據面板 -->
<div id="data-panel">
  <div id="data-inner">
    <h2>📊 答題數據</h2>
    <table id="data-table">
      <thead>
        <tr>
          <th>題目</th>
          <th>⏱ 秒數</th>
          <th>🔄 嘗試次數</th>
        </tr>
      </thead>
      <tbody id="data-tbody"></tbody>
    </table>
    <br>
    <button id="close-btn">關閉</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// 題目資料
// type: "drag" 或 "tap"
//
// drag: zone（判定區，%）, snap（吸附位置，%）
// tap:  targets（正確熱區 id 陣列）, decoys（干擾熱區 id 陣列，之後可加）
//
// hotspots: 各熱區的位置（%: left, top, width, height）
// ═══════════════════════════════════════════════
const HOTSPOT_DEFS = {
    "hs-sun":    { left: 2,  top: 5,  width: 18, height: 35 },
    "hs-door":   { left: 12, top: 10, width: 28, height: 75 },
    "hs-books":  { left: 68, top: 50, width: 22, height: 48 },
    "hs-window": { left: 82, top: 8,  width: 17, height: 45 },
    "hs-cloud":  { left: 38, top: 0,  width: 22, height: 18 },
};

const questions = [
    // ── 拖曳題 ──
    {
        type: "drag",
        itemId: "bear",
        question: "Can you put the bear on the rug?",
        audio: "q1.mp3",
        zone: { left: 0, right: 44, top: 60, bottom: 100 },
        snap: { left: 8, top: 68 },
    },
    {
        type: "drag",
        itemId: "car",
        question: "Can you put the car on the table?",
        audio: "q2.mp3",
        zone: { left: 44, right: 70, top: 45, bottom: 65 },
        snap: { left: 53, top: 54 },
    },
    {
        type: "drag",
        itemId: "ball",
        question: "Can you put the ball in front of the table?",
        audio: "q3.mp3",
        zone: { left: 48, right: 74, top: 66, bottom: 90 },
        snap: { left: 52, top: 70 },
    },
    // ── 圈選題 ──
    {
        type: "tap",
        question: "Can you find the sun? ☀️",
        audio: "q4.mp3",
        targets: ["hs-sun"],
        decoys:  ["hs-door", "hs-books", "hs-window", "hs-cloud"],
    },
    {
        type: "tap",
        question: "Where is the door? 🚪",
        audio: "q5.mp3",
        targets: ["hs-door"],
        decoys:  ["hs-sun", "hs-books", "hs-window", "hs-cloud"],
    },
    {
        type: "tap",
        question: "Can you find the books? 📚",
        audio: "q6.mp3",
        targets: ["hs-books"],
        decoys:  ["hs-sun", "hs-door", "hs-window", "hs-cloud"],
    },
    {
        type: "tap",
        question: "Where is the window? 🪟",
        audio: "q7.mp3",
        targets: ["hs-window"],
        decoys:  ["hs-sun", "hs-door", "hs-books", "hs-cloud"],
    },
    {
        type: "tap",
        question: "Can you find the cloud? ☁️",
        audio: "q8.mp3",
        targets: ["hs-cloud"],
        decoys:  ["hs-sun", "hs-door", "hs-books", "hs-window"],
    },
];

// ── 音效設定 ──
const CORRECT_SOUNDS = ["correct1.mp3", "correct2.mp3", "correct3.mp3"];
const WRONG_SOUNDS   = ["wrong1.mp3"];

function playSound(file) {
    const audio = new Audio(file);
    audio.play().catch(() => {}); // 忽略瀏覽器自動播放限制錯誤
}

function playCorrect() {
    const file = CORRECT_SOUNDS[Math.floor(Math.random() * CORRECT_SOUNDS.length)];
    playSound(file);
}

function playWrong() {
    const file = WRONG_SOUNDS[Math.floor(Math.random() * WRONG_SOUNDS.length)];
    playSound(file);
}

function playQuestion(n) {
    if (n < questions.length && questions[n].audio) {
        playSound(questions[n].audio);
    }
}

// ═══════════════════════════════════════════════
// 狀態
// ═══════════════════════════════════════════════
let currentQ   = 0;
let dragging   = false;
let activeItem = null;
let offsetX = 0, offsetY = 0;
let tapLocked  = false;

// 答題數據記錄
let qStartTime  = 0;
let qAttempts   = 0;
const qResults  = []; // { question, seconds, attempts }

const scene      = document.getElementById("scene");
const msgEl      = document.getElementById("message");
const finishEl   = document.getElementById("finish");
const questionEl = document.getElementById("question");
const progressEl = document.getElementById("progress");

// ═══════════════════════════════════════════════
// 初始化進度點
// ═══════════════════════════════════════════════
function buildDots() {
    progressEl.innerHTML = "";
    questions.forEach((_, i) => {
        const d = document.createElement("div");
        d.className = "dot";
        d.id = "dot" + i;
        progressEl.appendChild(d);
    });
}

function updateDots(current) {
    questions.forEach((_, i) => {
        const dot = document.getElementById("dot" + i);
        dot.className = "dot";
        if (i < current)   dot.classList.add("done");
        if (i === current) dot.classList.add("active");
    });
}

// ═══════════════════════════════════════════════
// 套用熱區位置（百分比 → style）
// ═══════════════════════════════════════════════
function applyHotspotPositions() {
    Object.entries(HOTSPOT_DEFS).forEach(([id, pos]) => {
        const el = document.getElementById(id);
        el.style.left   = pos.left   + "%";
        el.style.top    = pos.top    + "%";
        el.style.width  = pos.width  + "%";
        el.style.height = pos.height + "%";
    });
}


// ═══════════════════════════════════════════════
// 載入第 n 題（已放好的物件留在畫面上）
// ═══════════════════════════════════════════════
function loadQuestion(n) {
    // 只清除熱區，已完成的拖曳物件保留
    document.querySelectorAll(".hotspot").forEach(el => {
        el.classList.remove("active", "correct", "wrong");
    });
    msgEl.textContent = "";
    tapLocked = false;

    if (n >= questions.length) {
        document.body.classList.add("finished");
        questionEl.style.display = "";
        finishEl.style.display   = "flex";
        dataBtn.style.display    = "block";
        updateDots(questions.length);
        return;
    }

    const q = questions[n];
    questionEl.style.display = "";
    questionEl.textContent   = q.question;
    updateDots(n);
    // 稍微延遲再播，避免切換動畫干擾
    setTimeout(() => playQuestion(n), 300);

    // 開始計時 & 重設嘗試次數
    qStartTime = Date.now();
    qAttempts  = 0;

    if (q.type === "drag") {
        const el = document.getElementById(q.itemId);
        el.classList.add("active");
        if (el.style.cursor !== "default") {
            el.style.left = "";
            el.style.top  = "";
        }
    } else {
        [...q.targets, ...q.decoys].forEach(id => {
            document.getElementById(id).classList.add("active");
        });
    }
}

// ═══════════════════════════════════════════════
// 拖曳邏輯
// ═══════════════════════════════════════════════
document.querySelectorAll(".item").forEach(item => {
    item.addEventListener("pointerdown", (e) => {
        const q = questions[currentQ];
        if (q.type !== "drag") return;
        if (item.id !== q.itemId) return;
        if (item.style.cursor === "default") return;

        dragging   = true;
        activeItem = item;
        offsetX    = e.offsetX;
        offsetY    = e.offsetY;
        item.setPointerCapture(e.pointerId);
    });
});

window.addEventListener("pointermove", (e) => {
    if (!dragging || !activeItem) return;
    const rect = scene.getBoundingClientRect();
    activeItem.style.left = (e.clientX - rect.left - offsetX) + "px";
    activeItem.style.top  = (e.clientY - rect.top  - offsetY) + "px";
});

window.addEventListener("pointerup", () => {
    if (!dragging || !activeItem) return;
    dragging = false;

    const q    = questions[currentQ];
    const rect = scene.getBoundingClientRect();
    const W = rect.width;
    const bgImg = scene.querySelector(".bg");
    const H = bgImg.naturalWidth > 0
        ? W * (bgImg.naturalHeight / bgImg.naturalWidth)
        : rect.height;

    const itemL = parseFloat(activeItem.style.left) || 0;
    const itemT = parseFloat(activeItem.style.top)  || 0;
    const cx = ((itemL + activeItem.offsetWidth  / 2) / W) * 100;
    const cy = ((itemT + activeItem.offsetHeight / 2) / H) * 100;

    const z = q.zone;
    const inZone = cx > z.left && cx < z.right && cy > z.top && cy < z.bottom;

    if (inZone) {
        activeItem.style.transition = "left 0.3s ease, top 0.3s ease";
        activeItem.style.left   = (q.snap.left / 100 * W) + "px";
        activeItem.style.top    = (q.snap.top  / 100 * H) + "px";
        activeItem.style.cursor = "default";
        recordResult(currentQ);
        playCorrect();
        msgEl.innerHTML = "⭐ Great job!";
        setTimeout(() => { currentQ++; loadQuestion(currentQ); }, 900);
    } else {
        activeItem.style.left = "";
        activeItem.style.top  = "";
        qAttempts++;
        playWrong();
        msgEl.innerHTML = "❌ Try again!";
    }
    activeItem = null;
});

// ═══════════════════════════════════════════════
// 圈選邏輯
// ═══════════════════════════════════════════════

// 熱區點擊
document.querySelectorAll(".hotspot").forEach(hs => {
    hs.addEventListener("pointerdown", (e) => {
        e.stopPropagation();
        const q = questions[currentQ];
        if (q.type !== "tap") return;
        if (tapLocked) return;

        const isCorrect = q.targets.includes(hs.id);
        if (isCorrect) {
            tapLocked = true;
            hs.classList.add("correct");
            recordResult(currentQ);
            playCorrect();
            msgEl.innerHTML = "⭐ Great job!";
            setTimeout(() => { currentQ++; loadQuestion(currentQ); }, 900);
        } else {
            hs.classList.add("wrong");
            qAttempts++;
            playWrong();
            msgEl.innerHTML = "❌ Try again!";
            setTimeout(() => {
                hs.classList.remove("wrong");
                msgEl.textContent = "";
            }, 600);
        }
    });
});

// 畫面上的物件（bear / car / ball）在圈選題時也是干擾選項
document.querySelectorAll(".item").forEach(item => {
    item.addEventListener("pointerdown", (e) => {
        const q = questions[currentQ];
        if (q.type !== "tap") return;
        if (tapLocked) return;
        e.stopPropagation();
        qAttempts++;
        item.style.outline = "5px solid #e74c3c";
        item.style.borderRadius = "12px";
        playWrong();
        msgEl.innerHTML = "❌ Try again!";
        setTimeout(() => {
            item.style.outline = "";
            item.style.borderRadius = "";
            msgEl.textContent = "";
        }, 600);
    });
});

// ═══════════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════════
buildDots();
applyHotspotPositions();

// 記錄單題結果
function recordResult(n) {
    const seconds = ((Date.now() - qStartTime) / 1000).toFixed(1);
    qResults.push({
        question: questions[n].question,
        seconds:  parseFloat(seconds),
        attempts: qAttempts,
    });
}

// 顯示完成畫面 + 數據按鈕
const dataBtn   = document.getElementById("data-btn");
const dataPanel = document.getElementById("data-panel");
const dataTbody = document.getElementById("data-tbody");

dataBtn.addEventListener("click", () => {
    dataTbody.innerHTML = "";
    qResults.forEach(r => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td style="max-width:200px">${r.question}</td>
            <td>${r.seconds}s</td>
            <td>${r.attempts} 次錯誤</td>
        `;
        dataTbody.appendChild(tr);
    });
    dataPanel.classList.add("show");
});

document.getElementById("close-btn").addEventListener("click", () => {
    dataPanel.classList.remove("show");
});
resizeItems();

// 視窗大小改變時重新計算
window.addEventListener("resize", resizeItems);

function resizeItems() {
    const w = scene.offsetWidth;
    // 用背景圖的實際比例算高度，不依賴 offsetHeight
    const bgImg = scene.querySelector(".bg");
    const h = bgImg.naturalWidth > 0
        ? w * (bgImg.naturalHeight / bgImg.naturalWidth)
        : scene.offsetHeight;

    const sizes = { bear: 0.25, car: 0.10, ball: 0.12 };
    Object.entries(sizes).forEach(([id, ratio]) => {
        const el = document.getElementById(id);
        const placed = el.style.cursor === "default";
        el.style.width = (w * ratio) + "px";
        if (placed) {
            const q = questions.find(q => q.type === "drag" && q.itemId === id);
            if (q) {
                el.style.left = (q.snap.left / 100 * w) + "px";
                el.style.top  = (q.snap.top  / 100 * h) + "px";
            }
        }
    });
}

// START 按鈕：使用者點擊後解鎖音效，再載入第一題
document.getElementById("start-btn").addEventListener("click", () => {
    document.getElementById("start-screen").style.display = "none";
    loadQuestion(0);
});
</script>
</body>
</html>
